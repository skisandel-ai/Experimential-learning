<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brew & Bean - Order Online</title>
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>&#9749; Brew <span>&amp;</span> Bean</h1>
    <p>Artisan Coffee &middot; Est. 2018</p>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: ORDER FORM -->
    <div class="form-area">

      <p class="step-title">Step 1</p>
      <h2 class="section-heading">Choose Your Drink</h2>
      <div class="drink-grid">
        <label class="drink-card">
          <input type="radio" name="drink" checked>
          <div class="card-body">
            <span class="icon">&#9749;</span>
            <span class="name">Espresso</span>
            <span class="desc">Pure, bold shot</span>
            <span class="price">&#8377;290</span>
          </div>
        </label>
        <label class="drink-card">
          <input type="radio" name="drink">
          <div class="card-body">
            <span class="icon">&#127843;</span>
            <span class="name">Latte</span>
            <span class="desc">Silky steamed milk</span>
            <span class="price">&#8377;395</span>
          </div>
        </label>
        <label class="drink-card">
          <input type="radio" name="drink">
          <div class="card-body">
            <span class="icon">&#127849;</span>
            <span class="name">Cappuccino</span>
            <span class="desc">Airy foam top</span>
            <span class="price">&#8377;375</span>
          </div>
        </label>
      </div>

      <hr class="divider">

      <p class="step-title">Step 2</p>
      <h2 class="section-heading">Choose Size</h2>
      <div class="size-row">
        <label class="size-option">
          <input type="radio" name="size">
          <span class="s-icon">&#129347;</span>
          <span class="s-name">Small</span>
          <span class="s-oz">8 oz</span>
          <span class="s-price">Base price</span>
        </label>
        <label class="size-option">
          <input type="radio" name="size" checked>
          <span class="s-icon">&#129355;</span>
          <span class="s-name">Medium</span>
          <span class="s-oz">12 oz</span>
          <span class="s-price">+&#8377;60</span>
        </label>
        <label class="size-option">
          <input type="radio" name="size">
          <span class="s-icon">&#129380;</span>
          <span class="s-name">Large</span>
          <span class="s-oz">16 oz</span>
          <span class="s-price">+&#8377;125</span>
        </label>
      </div>

      <hr class="divider">

      <p class="step-title">Step 3</p>
      <h2 class="section-heading">Add-ons</h2>
      <div class="addon-grid">
        <label class="addon-item">
          <input type="checkbox">
          <span class="addon-name">Extra Shot</span>
          <span class="addon-price">+&#8377;60</span>
        </label>
        <label class="addon-item">
          <input type="checkbox">
          <span class="addon-name">Oat Milk</span>
          <span class="addon-price">+&#8377;50</span>
        </label>
        <label class="addon-item">
          <input type="checkbox">
          <span class="addon-name">Vanilla Syrup</span>
          <span class="addon-price">+&#8377;40</span>
        </label>
        <label class="addon-item">
          <input type="checkbox">
          <span class="addon-name">Caramel Drizzle</span>
          <span class="addon-price">+&#8377;40</span>
        </label>
      </div>

      <hr class="divider">

      <p class="step-title">Step 4</p>
      <h2 class="section-heading">Quantity</h2>
      <div class="qty-row">
        <span class="qty-label">How many cups?</span>
        <input type="number" value="1" min="1" max="20">
      </div>

      <button class="add-btn">&#9749; Add to Order</button>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="summary-area">
      <h2>Order Summary</h2>
      
      <div class="order-item">
        <span class="o-drink">Latte</span>
        <span class="o-size">Medium • 12 oz</span>
        <span class="o-addons">Oat Milk, Vanilla Syrup</span>
        <div class="o-bottom">
          <span>x1</span>
          <span class="o-subtotal">&#8377;485</span>
        </div>
      </div>

      <div class="totals">
        <div class="total-row"><span>Subtotal</span><span>&#8377;485</span></div>
        <div class="total-row"><span>Tax (8%)</span><span>&#8377;39</span></div>
        <div class="total-row grand"><span>Total</span><span>&#8377;524</span></div>
      </div>

      <button class="place-btn">Place Order</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Brew &amp; Bean — Where every cup tells a story.
  </footer>

</body>
</html>
