<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew & Bean - Order Online</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h1>☕ Brew <span>&amp;</span> Bean</h1>
        <div class="text-end">
            <button id="find-me" class="btn btn-outline-warning btn-sm">Find Nearest Store</button>
            <p id="location-display" class="m-0 mt-1" style="font-size: 11px;">Location: Not detected</p>
        </div>
    </div>
</header>

<div class="container my-5">
    <div class="row g-0 main-container shadow">
        <!-- LEFT: FORM -->
        <div class="col-lg-8 form-area p-4 bg-white">
            <p class="step-title">Step 1</p>
            <h2 class="section-heading">Choose Your Drink</h2>
            <div class="row g-3" id="drink-menu">
                <p>Loading drinks...</p>
            </div>

            <hr class="my-4">

            <p class="step-title">Step 2</p>
            <h2 class="section-heading">Drag Add-ons to Cup</h2>
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="addon-source-grid d-flex flex-wrap gap-2">
                        <!-- Draggable Items -->
                        <div class="draggable-addon" draggable="true" data-name="Extra Shot" data-price="60">☕ Extra Shot (+₹60)</div>
                        <div class="draggable-addon" draggable="true" data-name="Oat Milk" data-price="50">🥛 Oat Milk (+₹50)</div>
                        <div class="draggable-addon" draggable="true" data-name="Vanilla" data-price="40">🍯 Vanilla (+₹40)</div>
                    </div>
                </div>
                <div class="col-md-6 text-center">
                    <div id="drop-zone" class="p-4 border-dashed rounded">
                        <span class="d-block mb-2">📥 Drop Add-ons Here</span>
                        <div id="applied-addons" class="d-flex flex-wrap gap-1 justify-content-center"></div>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <div class="row align-items-center">
                <div class="col-6">
                    <h2 class="section-heading border-0 mb-0">Quantity</h2>
                </div>
                <div class="col-6">
                    <input type="number" id="qty-input" class="form-control w-50 ms-auto" value="1" min="1">
                </div>
            </div>
        </div>

        <!-- RIGHT: SUMMARY -->
        <div class="col-lg-4 summary-area p-4">
            <h2>Order Summary</h2>
            <div id="summary-content" class="mb-4">
                <p>Please select a drink.</p>
            </div>
            
            <div class="totals border-top pt-3">
                <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                <div class="d-flex justify-content-between mb-3 fw-bold fs-4 text-warning"><span>Total</span><span id="grand-total">₹0</span></div>
            </div>

            <button class="place-btn w-100" id="place-order-btn">Place Order</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
